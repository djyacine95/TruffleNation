openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TruffleNation Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Truffle product listings
  - name: orders
    description: Order management
  - name: sellers
    description: Seller profile and inventory
  - name: cart
    description: Shopping cart
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---- PRODUCTS ----
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: sellerId
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: inStock
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured/premium products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/categories:
    get:
      operationId: getProductCategories
      tags: [products]
      summary: Get all truffle categories with counts
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---- CART ----
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current user's cart
      responses:
        "200":
          description: Cart items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartBody"
      responses:
        "201":
          description: Cart item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear the cart
      responses:
        "204":
          description: Cart cleared

  /cart/{id}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemBody"
      responses:
        "200":
          description: Updated cart item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ---- ORDERS ----
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for current user
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [buyer, seller]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order (checkout from cart)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ---- SELLERS ----
  /sellers/profile:
    get:
      operationId: getSellerProfile
      tags: [sellers]
      summary: Get current user's seller profile
      responses:
        "200":
          description: Seller profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerProfile"
        "404":
          description: No seller profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSellerProfile
      tags: [sellers]
      summary: Create a seller profile (become a seller)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSellerProfileBody"
      responses:
        "201":
          description: Created seller profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerProfile"
    patch:
      operationId: updateSellerProfile
      tags: [sellers]
      summary: Update seller profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSellerProfileBody"
      responses:
        "200":
          description: Updated seller profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerProfile"

  /sellers:
    get:
      operationId: listSellers
      tags: [sellers]
      summary: List all active sellers
      responses:
        "200":
          description: Sellers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SellerProfile"

  /sellers/{id}:
    get:
      operationId: getSellerById
      tags: [sellers]
      summary: Get a public seller profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Seller profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---- DASHBOARD (wow endpoints) ----
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats for current user
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/seller-stats:
    get:
      operationId: getSellerStats
      tags: [dashboard]
      summary: Get seller-specific stats (revenue, top products, recent orders)
      responses:
        "200":
          description: Seller stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellerStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed for current user
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Product:
      type: object
      properties:
        id:
          type: integer
        sellerId:
          type: integer
        sellerName:
          type: ["string", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        pricePerGram:
          type: number
        weightGrams:
          type: number
        stockGrams:
          type: number
        origin:
          type: ["string", "null"]
        season:
          type: ["string", "null"]
        harvestDate:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isAvailable:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - sellerId
        - name
        - category
        - pricePerGram
        - weightGrams
        - stockGrams
        - isFeatured
        - isAvailable
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        pricePerGram:
          type: number
        weightGrams:
          type: number
        stockGrams:
          type: number
        origin:
          type: ["string", "null"]
        season:
          type: ["string", "null"]
        harvestDate:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isFeatured:
          type: boolean
      required:
        - name
        - category
        - pricePerGram
        - weightGrams
        - stockGrams

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
        pricePerGram:
          type: number
        weightGrams:
          type: number
        stockGrams:
          type: number
        origin:
          type: ["string", "null"]
        season:
          type: ["string", "null"]
        harvestDate:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isAvailable:
          type: boolean

    CartItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        quantityGrams:
          type: number
        createdAt:
          type: string
      required:
        - id
        - userId
        - productId
        - product
        - quantityGrams
        - createdAt

    AddToCartBody:
      type: object
      properties:
        productId:
          type: integer
        quantityGrams:
          type: number
      required:
        - productId
        - quantityGrams

    UpdateCartItemBody:
      type: object
      properties:
        quantityGrams:
          type: number
      required:
        - quantityGrams

    Order:
      type: object
      properties:
        id:
          type: integer
        buyerUserId:
          type: string
        sellerUserId:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        shippingAddress:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - buyerUserId
        - sellerUserId
        - status
        - totalAmount
        - items
        - createdAt
        - updatedAt

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantityGrams:
          type: number
        pricePerGram:
          type: number
        subtotal:
          type: number
      required:
        - id
        - orderId
        - productId
        - productName
        - quantityGrams
        - pricePerGram
        - subtotal

    CreateOrderBody:
      type: object
      properties:
        shippingAddress:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required: []

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, processing, shipped, delivered, cancelled]
      required:
        - status

    SellerProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        sellerType:
          type: string
          enum: [forager, commercial_supplier, restaurant, individual]
        imageUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        rating:
          type: ["number", "null"]
        totalSales:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - userId
        - displayName
        - sellerType
        - isVerified
        - totalSales
        - createdAt

    CreateSellerProfileBody:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        sellerType:
          type: string
          enum: [forager, commercial_supplier, restaurant, individual]
        imageUrl:
          type: ["string", "null"]
      required:
        - displayName
        - sellerType

    UpdateSellerProfileBody:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        sellerType:
          type: string
          enum: [forager, commercial_supplier, restaurant, individual]
        imageUrl:
          type: ["string", "null"]

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
        avgPricePerGram:
          type: number
      required:
        - category
        - count
        - avgPricePerGram

    DashboardSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        totalSpent:
          type: number
        favoriteCategory:
          type: ["string", "null"]
        isSeller:
          type: boolean
      required:
        - totalOrders
        - pendingOrders
        - totalSpent
        - isSeller

    SellerStats:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrdersFulfilled:
          type: integer
        activeListings:
          type: integer
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        revenueByMonth:
          type: array
          items:
            $ref: "#/components/schemas/MonthRevenue"
      required:
        - totalRevenue
        - totalOrdersFulfilled
        - activeListings
        - topProducts
        - recentOrders
        - revenueByMonth

    MonthRevenue:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
      required:
        - month
        - revenue

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [order_placed, order_status_update, new_listing, product_sold]
        message:
          type: string
        timestamp:
          type: string
        orderId:
          type: ["integer", "null"]
        productId:
          type: ["integer", "null"]
      required:
        - id
        - type
        - message
        - timestamp
